<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; justify-content: center; 
      align-items: center; height: 100vh;
    }
    .chat-container { 
      width: 420px; height: 600px; 
      background: white; border-radius: 20px; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
      display: flex; flex-direction: column; overflow: hidden;
    }
    .chat-header { 
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; padding: 20px; 
      display: flex; align-items: center; gap: 12px;
    }
    .avatar { 
      width: 40px; height: 40px; 
      background: rgba(255,255,255,0.3);
      border-radius: 50%; display: flex; 
      align-items: center; justify-content: center; 
      font-size: 20px;
    }
    .header-info h3 { font-size: 16px; font-weight: 600; }
    .header-info p { font-size: 12px; opacity: 0.8; }
    .online-dot { 
      width: 8px; height: 8px; background: #4ade80;
      border-radius: 50%; margin-left: auto;
      box-shadow: 0 0 6px #4ade80;
    }
    .chat-messages { 
      flex: 1; padding: 20px; 
      overflow-y: auto; display: flex; 
      flex-direction: column; gap: 12px;
      background: #f8f9fa;
    }
    .message { 
      display: flex; gap: 8px; align-items: flex-end;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(10px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    .message.user { flex-direction: row-reverse; }
    .msg-avatar { 
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; 
      justify-content: center; font-size: 14px;
      flex-shrink: 0;
    }
    .bot-avatar { background: linear-gradient(135deg, #667eea, #764ba2); }
    .user-avatar { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .msg-bubble { 
      max-width: 75%; padding: 10px 14px; 
      border-radius: 18px; font-size: 14px; 
      line-height: 1.5;
    }
    .bot .msg-bubble { 
      background: white; color: #333;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .user .msg-bubble { 
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border-bottom-right-radius: 4px;
    }
    .typing-bubble { 
      background: white; padding: 12px 16px; 
      border-radius: 18px; border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span { 
      width: 7px; height: 7px; background: #667eea;
      border-radius: 50%; animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 
      0%, 60%, 100% { transform: translateY(0); } 
      30% { transform: translateY(-6px); } 
    }
    .chat-input-area { 
      padding: 16px; background: white;
      border-top: 1px solid #eee;
      display: flex; gap: 10px; align-items: center;
    }
    .chat-input-area input { 
      flex: 1; padding: 12px 16px; 
      border: 1.5px solid #eee; border-radius: 25px;
      outline: none; font-size: 14px;
      transition: border-color 0.2s;
    }
    .chat-input-area input:focus { border-color: #667eea; }
    .send-btn { 
      width: 44px; height: 44px; 
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s; flex-shrink: 0;
    }
    .send-btn:hover { transform: scale(1.05); }
    .send-btn svg { width: 18px; height: 18px; fill: white; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">🤖</div>
      <div class="header-info">
        <h3>AI Assistant</h3>
        <p>Powered by Claude AI</p>
      </div>
      <div class="online-dot"></div>
    </div>

    <div class="chat-messages" id="messages">
      <div class="message bot">
        <div class="msg-avatar bot-avatar">🤖</div>
        <div class="msg-bubble">
          Hi! I am your AI assistant powered by Claude. How can I help you today? 😊
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <input 
        type="text" 
        id="userInput" 
        placeholder="Type your message..."
      />
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>

  <script>
    const CORS_PROXY = 'https://corsproxy.io/?';
const WEBHOOK_URL = CORS_PROXY + encodeURIComponent('https://xillehumausman.app.n8n.cloud/webhook-test/5d440d24-a078-48d2-83f7-0ca4d445000b');

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const messages = document.getElementById('messages');
      const userText = input.value.trim();
      if (!userText) return;

      messages.innerHTML += `
        <div class="message user">
          <div class="msg-avatar user-avatar">👤</div>
          <div class="msg-bubble">${userText}</div>
        </div>`;
      input.value = '';

      const typingId = 'typing-' + Date.now();
      messages.innerHTML += `
        <div class="message bot" id="${typingId}">
          <div class="msg-avatar bot-avatar">🤖</div>
          <div class="typing-bubble">
            <div class="typing-dots">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>`;
      messages.scrollTop = messages.scrollHeight;

      try {
       const response = await fetch(WEBHOOK_URL, {
  method: 'POST',
  headers: { 
    'Content-Type': 'application/json',
    'x-requested-with': 'XMLHttpRequest'
  },
          body: JSON.stringify({ message: userText })
        });

        const botReply = await response.text();
        document.getElementById(typingId).remove();
        messages.innerHTML += `
          <div class="message bot">
            <div class="msg-avatar bot-avatar">🤖</div>
            <div class="msg-bubble">${botReply}</div>
          </div>`;

      } catch (error) {
        document.getElementById(typingId).remove();
        messages.innerHTML += `
          <div class="message bot">
            <div class="msg-avatar bot-avatar">🤖</div>
            <div class="msg-bubble">Sorry, something went wrong. Please try again! 😔</div>
          </div>`;
      }
      messages.scrollTop = messages.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
